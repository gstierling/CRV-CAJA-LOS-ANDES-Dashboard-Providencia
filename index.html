<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activación CLA · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --orange: #f97316;
    --teal: #00d4aa;
    --text: #e6edf3;
    --muted: #8b949e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  .header { margin-bottom: 2.5rem; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .live-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.8)} }
  .title { font-size: 2rem; font-weight: 900; color: var(--orange); }
  .subtitle { font-size: 1rem; color: var(--muted); margin-left: 24px; margin-top: 2px; }
  .last-updated { font-size: 0.85rem; color: var(--muted); margin-left: 24px; margin-top: 4px; }

  /* Error */
  .error-msg {
    background: #1f1419;
    border: 1px solid #6e3535;
    border-radius: 10px;
    padding: 14px 18px;
    color: #f47067;
    font-size: 1rem;
    margin-bottom: 1.5rem;
    display: none;
  }

  /* Tabs */
  .tabs { display: flex; gap: 10px; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .tab {
    padding: 10px 24px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--orange); color: var(--orange); }
  .tab.active { background: var(--orange); color: #0d1117; border-color: var(--orange); }

  /* Section label */
  .section-label {
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    margin-top: 2rem;
  }

  /* Metric cards */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
  }
  .metric-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
  .metric-value { font-size: 3.2rem; font-weight: 900; color: var(--text); line-height: 1; }
  .metric-rate { font-size: 0.85rem; color: var(--muted); margin-top: 8px; font-weight: 600; }
  .metric-card.afiliado .metric-value { color: var(--teal); }
  .metric-card.noafiliado .metric-value { color: var(--orange); }

  /* Divider */
  .divider { border: none; border-top: 1px solid #21262d; margin: 2rem 0; }

  /* Total transacciones */
  .total-svc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 14px;
  }
  .total-svc-label { font-size: 0.9rem; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .total-svc-value { font-size: 2.8rem; font-weight: 900; color: var(--text); }
  .total-svc-rate { font-size: 0.85rem; color: var(--muted); margin-left: auto; font-weight: 600; white-space: nowrap; }

  /* Services grid */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }
  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
  }
  .service-name { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; font-weight: 700; line-height: 1.4; }
  .service-value { font-size: 2.8rem; font-weight: 900; color: var(--text); }
  .service-rate { font-size: 0.85rem; color: var(--muted); margin-top: 6px; font-weight: 600; }

  /* Footer */
  .footer { margin-top: 3rem; text-align: center; font-size: 0.8rem; color: var(--muted); }
  .footer a { color: var(--teal); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="live-dot"></span>
      <span class="title">Activación CLA</span>
    </div>
    <div class="subtitle">Registros en tiempo real · CicloRecreoVía</div>
    <div class="last-updated" id="last-updated">Cargando…</div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <div class="tabs">
    <button class="tab" data-min="0" onclick="setWindow(0)">Total</button>
    <button class="tab active" data-min="15" onclick="setWindow(15)">Últimos 15 min</button>
    <button class="tab" data-min="30" onclick="setWindow(30)">Últimos 30 min</button>
    <button class="tab" data-min="60" onclick="setWindow(60)">Últimos 60 min</button>
  </div>

  <div class="section-label">Consultas</div>
  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-label">Totales</div>
      <div class="metric-value" id="val-total">—</div>
      <div class="metric-rate" id="rate-total">— x min</div>
    </div>
    <div class="metric-card afiliado">
      <div class="metric-label">Afiliados</div>
      <div class="metric-value" id="val-si">—</div>
      <div class="metric-rate" id="rate-si">— x min</div>
    </div>
    <div class="metric-card noafiliado">
      <div class="metric-label">No afiliados</div>
      <div class="metric-value" id="val-no">—</div>
      <div class="metric-rate" id="rate-no">— x min</div>
    </div>
  </div>

  <hr class="divider">

  <div class="section-label">Transacciones</div>

  <div class="total-svc-card">
    <div>
      <div class="total-svc-label">Total</div>
      <div class="total-svc-value" id="val-svc-total">—</div>
    </div>
    <div class="total-svc-rate" id="rate-svc-total">— x min</div>
  </div>

  <div class="services-grid" id="services-grid"></div>

  <div class="footer">
    Actualización automática cada 30 segundos &nbsp;·&nbsp;
    <a href="https://docs.google.com/spreadsheets/d/1J48WDExtFgjx22Zf9rjTR8IdhAmffc_Dzpw086Cimeo/edit" target="_blank">Ver planilla</a>
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgndIP_bFGXJWbQgdvRlszrL4rqZzkeNuI7iXxkNiuW9HMSHA0oZIfIKo7Zu31HYnn7K_LbuHpkCTK/pub?gid=1084445575&single=true&output=csv";
const ALL_SERVICES = ["Préstamo de bicicleta", "Kit saludable (Agua + Fruta)", "Reparaciones mecánicas"];
let records = [];
let currentWindow = 15;

function parseTS(str) {
  if (!str) return null;
  try {
    const isPM = /p\.\s*m\./.test(str);
    const clean = str.replace(/[ap]\.\s*m\./g, "").trim();
    const [datePart, timePart] = clean.split(", ");
    if (!datePart || !timePart) return null;
    const [d, m, y] = datePart.split("-").map(Number);
    let [h, min, s] = timePart.trim().split(":").map(Number);
    if (isPM && h !== 12) h += 12;
    if (!isPM && h === 12) h = 0;
    return new Date(y, m - 1, d, h, min, s || 0);
  } catch(e) { return null; }
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const fields = [];
    let cur = "", inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur); cur = ""; }
      else { cur += ch; }
    }
    fields.push(cur);
    const ts = (fields[0] || "").replace(/^"|"$/g, "");
    const pertenece = (fields[2] || "").replace(/^"|"$/g, "").trim();
    const servicios = (fields[3] || "").replace(/^"|"$/g, "").trim();
    const date = parseTS(ts);
    if (date) result.push({ pertenece, servicios, date });
  }
  return result;
}

async function fetchData() {
  try {
    const res = await fetch(CSV_URL + "&cb=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    records = parseCSV(text);
    document.getElementById("error-msg").style.display = "none";
  } catch(e) {
    const el = document.getElementById("error-msg");
    el.style.display = "block";
    el.textContent = "No se pudo cargar la planilla: " + e.message;
  }
  render();
}

function setWindow(mins) {
  currentWindow = mins;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", +b.dataset.min === mins));
  render();
}

function render() {
  const now = new Date();
  const isTotal = currentWindow === 0;
  const cutoff = isTotal ? new Date(0) : new Date(now.getTime() - currentWindow * 60000);
  const subset = records.filter(r => r.date >= cutoff);

  // Para "Total", calculamos minutos desde el primer registro
  let mins = currentWindow;
  if (isTotal && records.length > 0) {
    const oldest = records.reduce((a, b) => a.date < b.date ? a : b).date;
    mins = Math.max(1, Math.round((now - oldest) / 60000));
  }
  if (mins === 0) mins = 1;

  const total = subset.length;
  const si = subset.filter(r => r.pertenece === "Sí pertenece").length;
  const no = subset.filter(r => r.pertenece === "No pertenece").length;

  const svcCounts = {};
  ALL_SERVICES.forEach(s => svcCounts[s] = 0);
  let totalSvc = 0;
  subset.forEach(r => {
    if (r.servicios) {
      r.servicios.split(" | ").forEach(s => {
        s = s.trim();
        if (s in svcCounts) { svcCounts[s]++; totalSvc++; }
      });
    }
  });

  const fmt = v => v.toFixed(2);

  document.getElementById("val-total").textContent = total;
  document.getElementById("rate-total").textContent = isTotal ? "—" : fmt(total / mins) + " x min";
  document.getElementById("val-si").textContent = si;
  document.getElementById("rate-si").textContent = isTotal ? "—" : fmt(si / mins) + " x min";
  document.getElementById("val-no").textContent = no;
  document.getElementById("rate-no").textContent = isTotal ? "—" : fmt(no / mins) + " x min";
  document.getElementById("val-svc-total").textContent = totalSvc;
  document.getElementById("rate-svc-total").textContent = isTotal ? "—" : fmt(totalSvc / mins) + " x min";

  const grid = document.getElementById("services-grid");
  grid.innerHTML = "";
  ALL_SERVICES.forEach(s => {
    const c = svcCounts[s] || 0;
    const card = document.createElement("div");
    card.className = "service-card";
    card.innerHTML = `<div class="service-name">${s}</div><div class="service-value">${c}</div><div class="service-rate">${isTotal ? "—" : fmt(c / mins) + " x min"}</div>`;
    grid.appendChild(card);
  });

  document.getElementById("last-updated").textContent =
    "Actualizado " + now.toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
