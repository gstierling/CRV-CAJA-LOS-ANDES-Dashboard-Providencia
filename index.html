<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activación CLA · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0097a7;
    --bg2: #00838f;
    --surface: rgba(0,0,0,0.18);
    --surface2: rgba(0,0,0,0.28);
    --border: rgba(255,255,255,0.18);
    --orange: #f97316;
    --white: #ffffff;
    --offwhite: rgba(255,255,255,0.85);
    --muted: rgba(255,255,255,0.6);
  }

  body {
    background: linear-gradient(160deg, #0097a7 0%, #006978 100%);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
  }

  .container { max-width: 960px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 2rem; text-align: center; }
  .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px; }
  .live-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--orange); flex-shrink: 0;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.8)} }
  .title { font-size: 2rem; font-weight: 900; color: var(--white); letter-spacing: 0.04em; }
  .subtitle { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }
  .last-updated { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  /* Error */
  .error-msg {
    background: rgba(150,20,20,0.4);
    border: 1px solid rgba(255,100,100,0.4);
    border-radius: 10px;
    padding: 14px 18px;
    color: #ffaaaa;
    font-size: 1rem;
    margin-bottom: 1.5rem;
    display: none;
  }

  /* Selector bloque */
  .selector-block { margin-bottom: 2.5rem; }

  .btn-total {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-bottom: 1.2rem;
    transition: all 0.15s;
  }
  .btn-total:hover { background: rgba(0,0,0,0.35); }
  .btn-total.active { background: var(--orange); border-color: var(--orange); color: #fff; }

  .ultimos-label {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
  }

  .tabs { display: flex; gap: 10px; }
  .tab {
    flex: 1;
    padding: 13px 10px;
    border-radius: 12px;
    border: 2px solid var(--border);
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    cursor: pointer;
    background: var(--surface);
    color: var(--white);
    transition: all 0.15s;
    text-align: center;
  }
  .tab:hover { background: rgba(0,0,0,0.35); }
  .tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }

  /* Section label */
  .section-label {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    margin-top: 2rem;
  }

  /* BIG metric card */
  .big-metric {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 28px 22px;
    margin-bottom: 14px;
    text-align: center;
  }
  .big-metric-label {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .big-metric-value {
    font-size: 5rem;
    font-weight: 900;
    color: var(--white);
    line-height: 1;
  }
  .big-metric-rate {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 10px;
    font-weight: 600;
  }

  /* Chart card */
  .chart-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 20px 16px;
    margin-bottom: 14px;
  }

  /* Metrics grid */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
  }
  .metric-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .metric-value { font-size: 3rem; font-weight: 900; color: var(--white); line-height: 1; }
  .metric-rate { font-size: 0.8rem; color: var(--muted); margin-top: 6px; font-weight: 600; }
  .metric-card.afiliado .metric-value { color: #b2ebf2; }
  .metric-card.noafiliado .metric-value { color: var(--orange); }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

  /* Footer */
  .footer { margin-top: 2.5rem; text-align: center; font-size: 0.8rem; color: var(--muted); }
  .footer a { color: #b2ebf2; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="live-dot"></span>
      <span class="title">Activación CLA</span>
    </div>
    <div class="subtitle">Registros en tiempo real · CicloRecreoVía</div>
    <div class="last-updated" id="last-updated">Cargando…</div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <!-- Selector -->
  <div class="selector-block">
    <button class="btn-total active" data-min="0" onclick="setWindow(0)">TOTAL</button>
    <div class="ultimos-label">Últimos</div>
    <div class="tabs">
      <button class="tab" data-min="15" onclick="setWindow(15)">15 Minutos</button>
      <button class="tab" data-min="30" onclick="setWindow(30)">30 Minutos</button>
      <button class="tab" data-min="60" onclick="setWindow(60)">60 Minutos</button>
    </div>
  </div>

  <!-- TRANSACCIONES -->
  <div class="big-metric">
    <div class="big-metric-label">Transacciones</div>
    <div class="big-metric-value" id="val-svc-total">—</div>
    <div class="big-metric-rate" id="rate-svc-total">— x min</div>
  </div>

  <!-- Gráfico barras servicios -->
  <div class="chart-card">
    <div style="position:relative;width:100%;height:220px;">
      <canvas id="svcChart" role="img" aria-label="Gráfico de barras con cantidad de cada servicio">Bicicletas, Kits, Reparaciones.</canvas>
    </div>
  </div>

  <hr class="divider">

  <!-- CONSULTAS -->
  <div class="section-label">Consultas</div>
  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-label">Totales</div>
      <div class="metric-value" id="val-total">—</div>
      <div class="metric-rate" id="rate-total">— x min</div>
    </div>
    <div class="metric-card afiliado">
      <div class="metric-label">Afiliados</div>
      <div class="metric-value" id="val-si">—</div>
      <div class="metric-rate" id="rate-si">— x min</div>
    </div>
    <div class="metric-card noafiliado">
      <div class="metric-label">No afiliados</div>
      <div class="metric-value" id="val-no">—</div>
      <div class="metric-rate" id="rate-no">— x min</div>
    </div>
  </div>

  <div class="footer">
    Actualización automática cada 30 segundos &nbsp;·&nbsp;
    <a href="https://docs.google.com/spreadsheets/d/1J48WDExtFgjx22Zf9rjTR8IdhAmffc_Dzpw086Cimeo/edit" target="_blank">Ver planilla</a>
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgndIP_bFGXJWbQgdvRlszrL4rqZzkeNuI7iXxkNiuW9HMSHA0oZIfIKo7Zu31HYnn7K_LbuHpkCTK/pub?gid=1084445575&single=true&output=csv";

const SVC_MAP = {
  "Préstamo de bicicleta": "Bicicletas",
  "Kit saludable (Agua + Fruta)": "Kits",
  "Reparaciones mecánicas": "Reparaciones"
};
const SVC_KEYS = ["Préstamo de bicicleta", "Kit saludable (Agua + Fruta)", "Reparaciones mecánicas"];
const SVC_LABELS = ["Bicicletas", "Kits", "Reparaciones"];

let records = [];
let currentWindow = 0;
let chart = null;

function parseTS(str) {
  if (!str) return null;
  try {
    const isPM = /p\.\s*m\./.test(str);
    const clean = str.replace(/[ap]\.\s*m\./g, "").trim();
    const [datePart, timePart] = clean.split(", ");
    if (!datePart || !timePart) return null;
    const [d, m, y] = datePart.split("-").map(Number);
    let [h, min, s] = timePart.trim().split(":").map(Number);
    if (isPM && h !== 12) h += 12;
    if (!isPM && h === 12) h = 0;
    return new Date(y, m - 1, d, h, min, s || 0);
  } catch(e) { return null; }
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const fields = [];
    let cur = "", inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur); cur = ""; }
      else { cur += ch; }
    }
    fields.push(cur);
    const ts = (fields[0] || "").replace(/^"|"$/g, "");
    const pertenece = (fields[2] || "").replace(/^"|"$/g, "").trim();
    const servicios = (fields[3] || "").replace(/^"|"$/g, "").trim();
    const date = parseTS(ts);
    if (date) result.push({ pertenece, servicios, date });
  }
  return result;
}

async function fetchData() {
  try {
    const res = await fetch(CSV_URL + "&cb=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    records = parseCSV(text);
    document.getElementById("error-msg").style.display = "none";
  } catch(e) {
    const el = document.getElementById("error-msg");
    el.style.display = "block";
    el.textContent = "No se pudo cargar la planilla: " + e.message;
  }
  render();
}

function setWindow(mins) {
  currentWindow = mins;
  document.querySelectorAll(".btn-total, .tab").forEach(b => {
    b.classList.toggle("active", +b.dataset.min === mins);
  });
  render();
}

function getMins() {
  const now = new Date();
  if (currentWindow > 0) return currentWindow;
  // TOTAL: desde las 9:00 AM del día de hoy
  const start9 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0, 0);
  return Math.max(1, Math.round((now - start9) / 60000));
}

function render() {
  const now = new Date();
  const isTotal = currentWindow === 0;
  const cutoff = isTotal ? new Date(0) : new Date(now.getTime() - currentWindow * 60000);
  const subset = records.filter(r => r.date >= cutoff);
  const mins = getMins();

  const total = subset.length;
  const si = subset.filter(r => r.pertenece === "Sí pertenece").length;
  const no = subset.filter(r => r.pertenece === "No pertenece").length;

  const svcCounts = {};
  SVC_KEYS.forEach(s => svcCounts[s] = 0);
  let totalSvc = 0;
  subset.forEach(r => {
    if (r.servicios) {
      r.servicios.split(" | ").forEach(s => {
        s = s.trim();
        if (s in svcCounts) { svcCounts[s]++; totalSvc++; }
      });
    }
  });

  const fmt = v => v.toFixed(2);

  document.getElementById("val-svc-total").textContent = totalSvc;
  document.getElementById("rate-svc-total").textContent = fmt(totalSvc / mins) + " x min";
  document.getElementById("val-total").textContent = total;
  document.getElementById("rate-total").textContent = fmt(total / mins) + " x min";
  document.getElementById("val-si").textContent = si;
  document.getElementById("rate-si").textContent = fmt(si / mins) + " x min";
  document.getElementById("val-no").textContent = no;
  document.getElementById("rate-no").textContent = fmt(no / mins) + " x min";

  // Gráfico barras
  const data = SVC_KEYS.map(s => svcCounts[s] || 0);
  if (chart) {
    chart.data.datasets[0].data = data;
    chart.update();
  } else {
    chart = new Chart(document.getElementById("svcChart"), {
      type: "bar",
      data: {
        labels: SVC_LABELS,
        datasets: [{
          data: data,
          backgroundColor: ["rgba(249,115,22,0.85)", "rgba(255,255,255,0.75)", "rgba(178,235,242,0.85)"],
          borderColor: ["#f97316", "#ffffff", "#b2ebf2"],
          borderWidth: 2,
          borderRadius: 8,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { enabled: true }
        },
        scales: {
          x: {
            ticks: { color: "rgba(255,255,255,0.85)", font: { family: "Nunito", size: 15, weight: "800" } },
            grid: { display: false },
            border: { display: false }
          },
          y: {
            ticks: { color: "rgba(255,255,255,0.55)", font: { family: "Nunito", size: 13 }, stepSize: 1 },
            grid: { color: "rgba(255,255,255,0.1)" },
            border: { display: false },
            beginAtZero: true
          }
        }
      }
    });
  }

  document.getElementById("last-updated").textContent =
    "Actualizado " + now.toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
