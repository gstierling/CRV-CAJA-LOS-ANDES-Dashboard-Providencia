<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activación CLA · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --surface: rgba(0,0,0,0.18);
    --surface2: rgba(0,0,0,0.28);
    --border: rgba(255,255,255,0.18);
    --orange: #f97316;
    --white: #ffffff;
    --muted: rgba(255,255,255,0.6);
  }
  body {
    background: linear-gradient(160deg, #0097a7 0%, #006978 100%);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
  }
  .container { max-width: 960px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 2rem; text-align: center; }
  .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px; }
  .live-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--orange); flex-shrink: 0; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.8)} }
  .title { font-size: 2rem; font-weight: 900; color: var(--white); letter-spacing: 0.04em; }
  .subtitle { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }
  .last-updated { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  .error-msg { background: rgba(150,20,20,0.4); border: 1px solid rgba(255,100,100,0.4); border-radius: 10px; padding: 14px 18px; color: #ffaaaa; font-size: 1rem; margin-bottom: 1.5rem; display: none; }

  /* Selector */
  .selector-block { margin-bottom: 2.5rem; }
  .btn-total { display: block; width: 100%; padding: 18px; background: var(--surface); border: 2px solid var(--border); border-radius: 14px; color: var(--white); font-family: 'Nunito', sans-serif; font-size: 1.6rem; font-weight: 900; letter-spacing: 0.1em; cursor: pointer; margin-bottom: 1.2rem; transition: all 0.15s; }
  .btn-total:hover { background: rgba(0,0,0,0.35); }
  .btn-total.active { background: var(--orange); border-color: var(--orange); }
  .ultimos-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 10px; }
  .tabs { display: flex; gap: 10px; }
  .tab { flex: 1; padding: 13px 10px; border-radius: 12px; border: 2px solid var(--border); font-size: 1rem; font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; background: var(--surface); color: var(--white); transition: all 0.15s; text-align: center; }
  .tab:hover { background: rgba(0,0,0,0.35); }
  .tab.active { background: var(--orange); border-color: var(--orange); }

  /* Big metric */
  .big-metric { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 28px 28px 22px; margin-bottom: 14px; text-align: center; }
  .big-metric-label { font-size: 1rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .big-metric-value { font-size: 5rem; font-weight: 900; color: var(--white); line-height: 1; }
  .big-metric-rate { font-size: 0.9rem; color: var(--muted); margin-top: 10px; font-weight: 600; }

  /* Chart card */
  .chart-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 20px 20px 0; margin-bottom: 14px; }

  /* Barras custom */
  .bars-wrap { display: flex; align-items: flex-end; justify-content: space-around; gap: 14px; padding: 0 10px; min-height: 200px; position: relative; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .bar-val { font-size: 1.6rem; font-weight: 900; color: var(--white); margin-bottom: 6px; }
  .bar-outer { width: 100%; border-radius: 10px 10px 0 0; display: flex; align-items: flex-end; overflow: hidden; }
  .bar-inner { width: 100%; border-radius: 10px 10px 0 0; transition: height 0.4s ease; }
  .bar-rate-row { display: flex; width: 100%; }
  .bar-rate { flex: 1; text-align: center; font-size: 0.7rem; font-weight: 700; color: var(--muted); padding: 6px 4px 14px; }
  .bar-label-row { display: flex; width: 100%; border-top: 1px solid var(--border); }
  .bar-label { flex: 1; text-align: center; font-size: 1rem; font-weight: 800; color: rgba(255,255,255,0.85); padding: 10px 4px 12px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

  /* Section label */
  .section-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  /* Consultas - franja horizontal */
  .consultas-strip { display: flex; gap: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .consulta-item { flex: 1; padding: 20px 16px; text-align: center; border-right: 1px solid var(--border); }
  .consulta-item:last-child { border-right: none; }
  .consulta-label { font-size: 0.8rem; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .consulta-value { font-size: 2.8rem; font-weight: 900; color: var(--white); line-height: 1; }
  .consulta-value.afiliado { color: #b2ebf2; }
  .consulta-value.noafiliado { color: var(--orange); }
  .consulta-rate { font-size: 0.75rem; color: var(--muted); margin-top: 6px; font-weight: 600; }

  /* Footer */
  .footer { margin-top: 2.5rem; text-align: center; font-size: 0.8rem; color: var(--muted); }
  .footer a { color: #b2ebf2; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="live-dot"></span>
      <span class="title">Activación CLA</span>
    </div>
    <div class="subtitle">Registros en tiempo real · CicloRecreoVía</div>
    <div class="last-updated" id="last-updated">Cargando…</div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <div class="selector-block">
    <button class="btn-total active" data-min="0" onclick="setWindow(0)">TOTAL</button>
    <div class="ultimos-label">Últimos</div>
    <div class="tabs">
      <button class="tab" data-min="15" onclick="setWindow(15)">15 Minutos</button>
      <button class="tab" data-min="30" onclick="setWindow(30)">30 Minutos</button>
      <button class="tab" data-min="60" onclick="setWindow(60)">60 Minutos</button>
    </div>
  </div>

  <!-- TRANSACCIONES big number -->
  <div class="big-metric">
    <div class="big-metric-label">Transacciones</div>
    <div class="big-metric-value" id="val-svc-total">—</div>
    <div class="big-metric-rate" id="rate-svc-total">— x min</div>
  </div>

  <!-- Barras custom -->
  <div class="chart-card">
    <div class="bars-wrap" id="bars-wrap">
      <!-- generado por JS -->
    </div>
    <div class="bar-label-row" id="bar-labels"></div>
  </div>

  <hr class="divider">

  <div class="section-label">Consultas</div>
  <div class="consultas-strip">
    <div class="consulta-item">
      <div class="consulta-label">Totales</div>
      <div class="consulta-value" id="val-total">—</div>
      <div class="consulta-rate" id="rate-total">— x min</div>
    </div>
    <div class="consulta-item">
      <div class="consulta-label">Afiliados</div>
      <div class="consulta-value afiliado" id="val-si">—</div>
      <div class="consulta-rate" id="rate-si">— x min</div>
    </div>
    <div class="consulta-item">
      <div class="consulta-label">No afiliados</div>
      <div class="consulta-value noafiliado" id="val-no">—</div>
      <div class="consulta-rate" id="rate-no">— x min</div>
    </div>
  </div>

  <div class="footer">
    Actualización automática cada 30 segundos &nbsp;·&nbsp;
    <a href="https://docs.google.com/spreadsheets/d/1J48WDExtFgjx22Zf9rjTR8IdhAmffc_Dzpw086Cimeo/edit" target="_blank">Ver planilla</a>
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgndIP_bFGXJWbQgdvRlszrL4rqZzkeNuI7iXxkNiuW9HMSHA0oZIfIKo7Zu31HYnn7K_LbuHpkCTK/pub?gid=1084445575&single=true&output=csv";

const SVCS = [
  { key: "Préstamo de bicicleta",       label: "Bicis",       color: "#f97316" },
  { key: "Kit saludable (Agua + Fruta)", label: "Kits",        color: "#fde047" },
  { key: "Reparaciones mecánicas",       label: "Mecánica",    color: "#a78bfa" },
];

let records = [];
let currentWindow = 0;

function parseTS(str) {
  if (!str) return null;
  try {
    const isPM = /p\.\s*m\./.test(str);
    const clean = str.replace(/[ap]\.\s*m\./g, "").trim();
    const [datePart, timePart] = clean.split(", ");
    if (!datePart || !timePart) return null;
    const [d, m, y] = datePart.split("-").map(Number);
    let [h, min, s] = timePart.trim().split(":").map(Number);
    if (isPM && h !== 12) h += 12;
    if (!isPM && h === 12) h = 0;
    return new Date(y, m - 1, d, h, min, s || 0);
  } catch(e) { return null; }
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const fields = [];
    let cur = "", inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur); cur = ""; }
      else { cur += ch; }
    }
    fields.push(cur);
    const ts = (fields[0] || "").replace(/^"|"$/g, "");
    const pertenece = (fields[2] || "").replace(/^"|"$/g, "").trim();
    const servicios = (fields[3] || "").replace(/^"|"$/g, "").trim();
    const date = parseTS(ts);
    if (date) result.push({ pertenece, servicios, date });
  }
  return result;
}

async function fetchData() {
  try {
    const res = await fetch(CSV_URL + "&cb=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    records = parseCSV(text);
    document.getElementById("error-msg").style.display = "none";
  } catch(e) {
    const el = document.getElementById("error-msg");
    el.style.display = "block";
    el.textContent = "No se pudo cargar la planilla: " + e.message;
  }
  render();
}

function setWindow(mins) {
  currentWindow = mins;
  document.querySelectorAll(".btn-total, .tab").forEach(b => {
    b.classList.toggle("active", +b.dataset.min === mins);
  });
  render();
}

function getMins() {
  const now = new Date();
  if (currentWindow > 0) return currentWindow;
  const start9 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0, 0);
  return Math.max(1, Math.round((now - start9) / 60000));
}

function render() {
  const now = new Date();
  const isTotal = currentWindow === 0;
  const cutoff = isTotal ? new Date(0) : new Date(now.getTime() - currentWindow * 60000);
  const subset = records.filter(r => r.date >= cutoff);
  const mins = getMins();

  const total = subset.length;
  const si = subset.filter(r => r.pertenece === "Sí pertenece").length;
  const no = subset.filter(r => r.pertenece === "No pertenece").length;

  const svcCounts = {};
  SVCS.forEach(s => svcCounts[s.key] = 0);
  let totalSvc = 0;
  subset.forEach(r => {
    if (r.servicios) {
      r.servicios.split(" | ").forEach(s => {
        s = s.trim();
        if (s in svcCounts) { svcCounts[s]++; totalSvc++; }
      });
    }
  });

  const fmt = v => v.toFixed(2);

  // Big number
  document.getElementById("val-svc-total").textContent = totalSvc;
  document.getElementById("rate-svc-total").textContent = fmt(totalSvc / mins) + " x min";

  // Consultas strip
  document.getElementById("val-total").textContent = total;
  document.getElementById("rate-total").textContent = fmt(total / mins) + " x min";
  document.getElementById("val-si").textContent = si;
  document.getElementById("rate-si").textContent = fmt(si / mins) + " x min";
  document.getElementById("val-no").textContent = no;
  document.getElementById("rate-no").textContent = fmt(no / mins) + " x min";

  // Barras custom
  const counts = SVCS.map(s => svcCounts[s.key] || 0);
  const maxVal = Math.max(...counts, 1);
  const BAR_MAX_H = 180; // px

  const wrap = document.getElementById("bars-wrap");
  const labelsRow = document.getElementById("bar-labels");
  wrap.innerHTML = "";
  labelsRow.innerHTML = "";

  SVCS.forEach((svc, i) => {
    const c = counts[i];
    const barH = Math.max(4, Math.round((c / maxVal) * BAR_MAX_H));
    const rate = fmt(c / mins);

    const col = document.createElement("div");
    col.className = "bar-col";
    col.style.justifyContent = "flex-end";

    col.innerHTML = `
      <div class="bar-val">${c}</div>
      <div style="width:100%;height:${BAR_MAX_H}px;display:flex;align-items:flex-end;">
        <div style="width:100%;height:${barH}px;background:${svc.color};border-radius:10px 10px 0 0;"></div>
      </div>
      <div class="bar-rate">${rate} x min</div>
    `;
    wrap.appendChild(col);

    const lbl = document.createElement("div");
    lbl.className = "bar-label";
    lbl.textContent = svc.label;
    labelsRow.appendChild(lbl);
  });

  document.getElementById("last-updated").textContent =
    "Actualizado " + now.toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
